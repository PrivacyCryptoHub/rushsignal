<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RUSH</title>

  <meta property="og:title" content="$RUSH">
  <meta property="og:description" content="They’re starting to realize.">
  <meta property="og:image" content="https://privacycryptohub.github.io/rushsignal/preview.jpg?v=6">
  <meta property="og:url" content="https://privacycryptohub.github.io/rushsignal">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
    }

    body {
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('./bg-main.jpg') no-repeat center center;
background-size: cover;
      background-size: cover;
      filter: brightness(0.75);
      z-index: -2;
    }

    .sparkles {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(0,255,136,0.18) 1px, transparent 1px);
      background-size: 42px 42px;
      animation: move 18s linear infinite;
      z-index: -1;
      opacity: 0.7;
    }

    @keyframes move {
      from { transform: translate(0,0); }
      to { transform: translate(-100px,-100px); }
    }

    .overlay {
      width: min(90%, 520px);
      background: rgba(0,0,0,0.72);
      padding: 38px 28px;
      border-radius: 22px;
      backdrop-filter: blur(7px);
      animation: fadeIn 1.1s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 35px rgba(0,255,136,0.2);
    }

    @keyframes fadeIn {
      from { opacity:0; transform: scale(0.92); }
      to { opacity:1; transform: scale(1); }
    }

    h1 {
      font-size: clamp(44px, 9vw, 68px);
      color: #ffe600;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ffe600; }
      to { text-shadow: 0 0 30px #ffe600, 0 0 60px #ffe600; }
    }

    p {
      margin-top: 10px;
      font-size: 18px;
      opacity: 0.95;
    }

    .contract {
      margin-top: 20px;
      font-size: 13px;
      word-break: break-all;
      color: #00ff88;
      animation: pulseText 2s infinite;
    }

    @keyframes pulseText {
      0% { opacity: 0.65; }
      50% { opacity: 1; }
      100% { opacity: 0.65; }
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 36px;
      background: #00ff88;
      color: black;
      font-weight: bold;
      text-decoration: none;
      border-radius: 11px;
      transition: 0.2s;
      animation: pulseBtn 2s infinite;
    }

    @keyframes pulseBtn {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .btn:hover {
      background: #00cc6a;
      transform: scale(1.1);
    }

    .line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00ff88, transparent);
      animation: pump 2s linear infinite;
    }

    @keyframes pump {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>

<body>
  <div class="sparkles"></div>

  <div class="overlay">
    <h1>$RUSH</h1>
    <p>They’re starting to realize</p>

    <div class="contract">
      9wFPD97XA5qxGBCCRWLfzXtghoVBUCFCkHr8LpmBKJtM
    </div>

    <a class="btn" href="https://join.pump.fun/HSag/41xc0qpt" target="_blank">
      BUY NOW
    </a>

    <div class="line"></div>
  </div>
</body>
</html>
